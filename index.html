<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
        <script src="script.js" defer></script>
        <title>Etch A Sketch</title>
    </head>
    <body>
            <header>Etch A Sketch</header>
            <main>
                <div class="board"></div>
                <div class="tools">
                    <input type="color" id="color-pick" value="#444444" onchange="setColor()">
                    <button class="eraser" onclick="setEraser()"></button>
                    <button class="clear" onclick="clearBoard()"></button>
                    <button class="save"></button>
                    <div class="resolution-pick">
                        Resolution
                        <select id="resolution-selector" onchange="changeResolution()">
                            <option value="1">1x1</option>
                            <option value="2">2x2</option>
                            <option value="4">4x4</option>
                            <option value="8">8x8</option>
                            <option value="16" selected="selected">16x16</option>
                            <option value="32">32x32</option>
                            <option value="64">64x64</option>
                        </select>
                    </div>
                </div>
            </main>
            <footer><a href="https://github.com/Shalakushka">@Shalakushka</a></footer>
        </body>
        </html>
